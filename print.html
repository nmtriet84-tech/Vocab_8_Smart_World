<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tạo đề in offline</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      --ink: #171717;
      --muted: #5d5965;
      --line: #d7d2dc;
      --paper: #ffffff;
      --bg: #f3f0e9;
      --accent: #1d4ed8;
      --font-size: 10pt;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: Arial, Helvetica, sans-serif;
    }

    button,
    input,
    label,
    select {
      font: inherit;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: grid;
      grid-template-columns: repeat(8, minmax(120px, 1fr));
      gap: 10px;
      padding: 12px;
      background: #fffffff2;
      border-bottom: 1px solid var(--line);
      box-shadow: 0 8px 24px #00000014;
    }

    .field {
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    .field span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .field input,
    .field select {
      width: 100%;
      min-height: 38px;
      border: 1px solid #bab5c0;
      border-radius: 8px;
      padding: 0 10px;
      background: #fff;
    }

    .check {
      min-height: 38px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px;
      border: 1px solid #bab5c0;
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font-weight: 700;
    }

    .actions {
      display: flex;
      gap: 8px;
      align-items: end;
    }

    .btn {
      min-height: 38px;
      border: 0;
      border-radius: 8px;
      padding: 0 14px;
      background: var(--accent);
      color: #fff;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn.secondary {
      background: #111827;
    }

    .notice {
      grid-column: 1 / -1;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .unit-panel {
      grid-column: 1 / -1;
      display: grid;
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .unit-panel-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
    }

    .unit-panel-title {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .unit-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .mini-btn {
      min-height: 28px;
      border: 1px solid #bab5c0;
      border-radius: 7px;
      padding: 0 10px;
      background: #fff;
      color: var(--ink);
      font-weight: 800;
      cursor: pointer;
    }

    .unit-list {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .unit-card {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 8px;
      align-items: start;
      min-height: 44px;
      padding: 8px;
      border: 1px solid #bab5c0;
      border-radius: 8px;
      background: #fdfdfd;
      font-size: 12px;
      line-height: 1.2;
    }

    .unit-card strong,
    .unit-card span span {
      display: block;
    }

    .page {
      width: 210mm;
      margin: 12px auto;
      background: transparent;
    }

    .exam {
      font-size: var(--font-size);
      line-height: 1.18;
    }

    .exam-page,
    .answer-page {
      position: relative;
      width: 210mm;
      min-height: 297mm;
      margin: 12px auto;
      padding: 8mm 8mm 15mm;
      background: var(--paper);
      box-shadow: 0 12px 36px #00000022;
    }

    .exam-page {
      break-after: page;
      page-break-after: always;
    }

    .answer-page {
      break-after: auto;
      page-break-after: auto;
    }

    .exam-page.last {
      break-after: auto;
      page-break-after: auto;
    }

    .exam-header {
      display: grid;
      grid-template-columns: 1fr 32mm;
      gap: 6mm;
      align-items: start;
      padding-bottom: 3mm;
      border-bottom: 1px solid #000;
    }

    .exam-title-row {
      display: flex;
      align-items: baseline;
      gap: 4mm;
      flex-wrap: wrap;
      margin-bottom: 2mm;
    }

    .exam-title-row h1 {
      margin: 0 0 2mm;
      font-size: 15pt;
      line-height: 1;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .exam-time {
      font-size: 9pt;
      font-weight: 700;
      white-space: nowrap;
    }

    .exam-info-row {
      display: flex;
      gap: 8mm;
      align-items: baseline;
      margin-bottom: 2mm;
      font-size: 9pt;
      font-weight: 700;
      flex-wrap: wrap;
    }

    .dot-line {
      display: inline-block;
      min-width: 34mm;
      border-bottom: 1px dotted #000;
      transform: translateY(-1px);
    }

    .exam-title-row .dot-line {
      min-width: 78mm;
    }

    .student-info {
      display: grid;
      grid-template-columns: auto minmax(34mm, 1fr) auto 22mm;
      gap: 1.5mm 2mm;
      margin-top: 2mm;
      align-items: end;
      max-width: 130mm;
    }

    .line {
      border-bottom: 1px dotted #000;
      min-height: 4mm;
    }

    .qr-code-box {
      display: grid;
      justify-items: center;
      gap: 1mm;
      padding: 1.5mm;
      border: 1px solid #000;
      text-align: center;
      font-weight: 700;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .qr-code-box svg {
      width: 24mm;
      height: 24mm;
      display: block;
    }

    .qr-code-label {
      display: block;
      font-size: 9pt;
      letter-spacing: .5px;
    }

    .answer-sheet {
      position: relative;
      margin: 3mm 0;
      padding: 2mm 0 2mm;
      border-bottom: 1px solid #000;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .answer-sheet.marked {
      margin-top: 4mm;
      padding: 7mm 8mm 8mm;
      border: 1.2px solid #000;
    }

    .answer-sheet.centered {
      width: 100%;
      margin-left: auto;
      margin-right: auto;
    }

    .scan-marker {
      position: absolute;
      width: 5mm;
      height: 5mm;
      background: #000;
      print-color-adjust: exact;
      -webkit-print-color-adjust: exact;
    }

    .scan-marker.tl { top: 1.5mm; left: 1.5mm; }
    .scan-marker.tr { top: 1.5mm; right: 1.5mm; }
    .scan-marker.bl { bottom: 1.5mm; left: 1.5mm; }
    .scan-marker.br { bottom: 1.5mm; right: 1.5mm; }

    .answer-sheet-title {
      margin: 0 0 1.5mm;
      font-weight: 700;
      text-align: center;
    }

    .bubble-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 1.2mm 2mm;
      align-items: start;
    }

    .bubble-column,
    .key-column {
      display: grid;
      gap: 1.2mm;
    }

    .bubble-item {
      display: grid;
      grid-template-columns: 8mm repeat(4, 1fr);
      gap: 1mm;
      align-items: center;
      white-space: nowrap;
    }

    .bubble-num {
      font-weight: 700;
      text-align: right;
    }

    .bubble-choice {
      display: inline-flex;
      align-items: center;
      font-size: .92em;
    }

    .circle {
      width: 4mm;
      height: 4mm;
      display: inline-grid;
      place-items: center;
      border: 1px solid #000;
      border-radius: 50%;
      color: #000;
      font-size: 2.15mm;
      line-height: 1;
      font-weight: 700;
    }

    .questions {
      column-count: 2;
      column-gap: 6mm;
      column-rule: 1px solid #d9d9d9;
    }

    .question {
      break-inside: avoid;
      page-break-inside: avoid;
      margin: 0 0 2.4mm;
      padding: 0 0 1.8mm;
      border-bottom: 1px dotted #c7c7c7;
    }

    .end-note {
      margin: 4mm 0 0;
      text-align: center;
      font-weight: 900;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .page-footer {
      position: absolute;
      left: 8mm;
      right: 8mm;
      bottom: 5mm;
      display: flex;
      justify-content: space-between;
      border-top: 1px solid #000;
      padding-top: 1.5mm;
      font-size: 8.5pt;
      font-weight: 700;
    }

    .q-text {
      margin: 0 0 1mm;
      font-weight: 700;
    }

    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .7mm 2mm;
    }

    .option {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .option.correct {
      font-weight: 900;
      text-decoration: underline;
    }

    .answer-page.no-answer-key {
      display: none;
    }

    .key-title {
      margin: 0 0 3mm;
      text-align: center;
      font-size: 15pt;
      text-transform: uppercase;
    }

    .key-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 1.2mm 2mm;
      font-size: var(--font-size);
      align-items: start;
    }

    .key-item {
      display: grid;
      grid-template-columns: 8mm repeat(4, 1fr);
      gap: 1mm;
      align-items: center;
    }

    .key-choice {
      display: inline-flex;
      align-items: center;
    }

    .key-choice.hit .circle {
      background: #000;
      color: #fff;
    }

    .readable-key {
      margin-top: 3mm;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .readable-key-title {
      margin: 0 0 1.5mm;
      font-weight: 700;
    }

    .readable-key-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      grid-auto-flow: column;
      grid-template-rows: repeat(var(--key-rows, 8), auto);
      gap: 1.2mm 2mm;
      font-size: 9pt;
    }

    .readable-key-item {
      padding-bottom: .7mm;
      border-bottom: 1px dotted #b6b6b6;
      font-weight: 700;
      white-space: nowrap;
    }

    .teacher-sign {
      width: 66mm;
      min-height: 30mm;
      margin: 5mm 0 0 auto;
      padding: 3mm;
      border: 1px solid #000;
      text-align: center;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .teacher-sign strong {
      display: block;
      margin-bottom: 2mm;
      text-transform: uppercase;
    }

    .teacher-sign .sign-line {
      display: block;
      margin-top: 16mm;
      border-top: 1px dotted #000;
      padding-top: 1mm;
      font-size: 8.5pt;
    }

    .stats-section {
      margin-top: 4mm;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .stats-title {
      margin: 0 0 2mm;
      font-size: 12pt;
      text-transform: uppercase;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 3mm;
      align-items: start;
    }

    .stats-box {
      min-width: 0;
    }

    .stats-box h3 {
      margin: 0 0 1.5mm;
      font-size: 10pt;
    }

    .stats-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 8.8pt;
    }

    .stats-table th,
    .stats-table td {
      padding: 1mm 1.2mm;
      border: 1px solid #000;
      vertical-align: top;
    }

    .stats-table th {
      background: #f0f0f0;
      text-align: left;
    }

    .stats-table td:nth-child(2),
    .stats-table td:nth-child(3) {
      text-align: right;
      white-space: nowrap;
    }

    .empty {
      padding: 12px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 980px) {
      .toolbar {
        position: static;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .unit-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .page {
        width: calc(100% - 20px);
        min-height: auto;
      }

      .exam-page,
      .answer-page {
        width: 100%;
        min-height: auto;
      }
    }

    @page {
      size: A4;
      margin: 7mm;
    }

    @media print {
      :root {
        --font-size: var(--print-font-size);
      }

      body {
        background: #fff;
      }

      .toolbar {
        display: none;
      }

      .page {
        width: auto;
        min-height: auto;
        margin: 0;
        padding: 0;
        background: transparent;
        box-shadow: none;
      }

      .exam-page,
      .answer-page {
        width: auto;
        min-height: 283mm;
        margin: 0;
        padding: 0 0 12mm;
        box-shadow: none;
      }

      .question {
        margin-bottom: 2mm;
        padding-bottom: 1.4mm;
      }

      .answer-sheet {
        display: block;
        visibility: visible;
        print-color-adjust: exact;
        -webkit-print-color-adjust: exact;
      }

      .answer-page.no-answer-key {
        display: none;
      }
    }
  </style>
</head>
<body>
  <form class="toolbar" id="controlForm">
    <label class="field">
      <span>Mã đề</span>
      <input id="examCodeInput" maxlength="3" placeholder="Để trống để tự tạo">
    </label>
    <label class="field">
      <span>Bộ đề</span>
      <select id="datasetInput"></select>
    </label>
    <label class="field">
      <span>Số câu hỏi</span>
      <input id="questionCountInput" type="number" min="1" max="284" value="40">
    </label>
    <label class="field">
      <span>Thời gian</span>
      <input id="timeLimitInput" type="number" min="1" max="180" value="45">
    </label>
    <label class="field">
      <span>Font size</span>
      <select id="fontSizeInput">
        <option value="8.5pt">8.5pt - siêu tiết kiệm</option>
        <option value="9pt">9pt - tiết kiệm</option>
        <option value="10pt" selected>10pt - dễ đọc</option>
        <option value="11pt">11pt - rộng rãi</option>
        <option value="12pt">12pt - rất dễ đọc</option>
      </select>
    </label>
    <label class="check">
      <input id="studentAnswerInput" type="checkbox" checked>
      In bảng điền câu trả lời
    </label>
    <label class="check">
      <input id="separateAnswerInput" type="checkbox" checked>
      In đáp án ra trang riêng
    </label>
    <label class="check">
      <input id="boldAnswerInput" type="checkbox">
      In đậm đáp án trên câu hỏi
    </label>
    <div class="actions">
      <button class="btn" type="submit">Tạo đề</button>
      <button class="btn secondary" id="printBtn" type="button">In / Lưu PDF</button>
    </div>
    <section class="unit-panel">
      <div class="unit-panel-head">
        <span class="unit-panel-title">Chọn Unit để in</span>
        <div class="unit-actions">
          <button class="mini-btn" id="selectAllUnitsBtn" type="button">Chọn tất cả</button>
          <button class="mini-btn" id="clearUnitsBtn" type="button">Bỏ chọn</button>
        </div>
      </div>
      <div id="printUnitChoices" class="unit-list"></div>
    </section>
    <div class="notice" id="notice">Gợi ý: nhập lại đúng mã đề và số câu để hiển thị lại đề cũ.</div>
  </form>

  <main class="page">
    <section class="exam" id="exam"></section>
  </main>

  <script src="qrcode-generator.js"></script>
  <script src="embedded_manifest.js"></script>
  <script src="embedded_smart_world.js"></script>
  <script src="embedded_global_success.js"></script>
  <script>
    const LETTERS = ["A", "B", "C", "D"];
    const QUESTION_MANIFEST_URL = "question_manifes.json";
    const $ = (id) => document.getElementById(id);
    const EMBEDDED_DATASETS = {
      "question_global_success.json": () => window.EMBEDDED_GLOBAL_SUCCESS,
      "question_smart_world.json": () => window.EMBEDDED_SMART_WORLD,
      "questions.json": () => window.EMBEDDED_SMART_WORLD
    };

    const state = {
      manifest: null,
      datasets: [],
      questions: [],
      filtered: [],
      questionFile: "",
      questionTitle: "",
      paper: null
    };

    init();

    async function init() {
      bindEvents();
      const params = new URLSearchParams(location.search);
      if (params.get("code")) $("examCodeInput").value = params.get("code");
      if (params.get("count")) $("questionCountInput").value = params.get("count");
      if (params.get("font")) $("fontSizeInput").value = params.get("font");
      if (params.get("time")) $("timeLimitInput").value = params.get("time");

      try {
        state.manifest = await loadQuestionManifest();
        state.datasets = Array.isArray(state.manifest.datasets) ? state.manifest.datasets : [];
        renderDatasetOptions();
        const selectedDataset = resolveQuestionDataset();
        await loadDataset(selectedDataset);
        applyUnitParam();
        updateFilteredQuestions();
        generatePaper();
      } catch (error) {
        $("exam").innerHTML = `<div class="empty">Không đọc được dữ liệu câu hỏi. Hãy kiểm tra file JSON và mở bằng local server hoặc GitHub Pages.</div>`;
        $("notice").textContent = error.message;
        console.error(error);
      }
    }

    function bindEvents() {
      $("controlForm").addEventListener("submit", (event) => {
        event.preventDefault();
        generatePaper();
      });
      $("printBtn").addEventListener("click", () => window.print());
      $("datasetInput").addEventListener("change", async () => {
        const selected = findDataset($("datasetInput").value, state.datasets);
        if (!selected) return;
        await loadDataset(selected);
        updateFilteredQuestions();
        $("examCodeInput").value = "";
        generatePaper();
      });
      $("selectAllUnitsBtn").addEventListener("click", () => {
        document.querySelectorAll("input[name='printUnit']").forEach((input) => {
          input.checked = true;
        });
        updateFilteredQuestions();
        generatePaper();
      });
      $("clearUnitsBtn").addEventListener("click", () => {
        document.querySelectorAll("input[name='printUnit']").forEach((input) => {
          input.checked = false;
        });
        updateFilteredQuestions();
        generatePaper();
      });
      $("fontSizeInput").addEventListener("change", () => {
        document.documentElement.style.setProperty("--font-size", $("fontSizeInput").value);
        document.documentElement.style.setProperty("--print-font-size", $("fontSizeInput").value);
      });
      $("timeLimitInput").addEventListener("change", () => {
        updateUrl(state.paper?.code || $("examCodeInput").value.trim().toUpperCase(), Number($("questionCountInput").value || 40));
        renderPaper();
      });
      $("separateAnswerInput").addEventListener("change", renderPaper);
      $("boldAnswerInput").addEventListener("change", renderPaper);
      $("studentAnswerInput").addEventListener("change", renderPaper);
    }

    async function loadQuestionManifest() {
      if (location.protocol === "file:" && window.EMBEDDED_MANIFEST) {
        return window.EMBEDDED_MANIFEST;
      }
      try {
        const response = await fetch(QUESTION_MANIFEST_URL, { cache: "no-store" });
        if (!response.ok) throw new Error(`Không tải được ${QUESTION_MANIFEST_URL}`);
        return await response.json();
      } catch (error) {
        if (window.EMBEDDED_MANIFEST) {
          console.warn("Không đọc được question_manifes.json, dùng dữ liệu nhúng.", error);
          return window.EMBEDDED_MANIFEST;
        }
        console.warn("Không đọc được question_manifes.json, dùng mặc định.", error);
        return {
          default: "question_global_success.json",
          datasets: [
            { id: "global_success", title: "English 8 Global Success", file: "question_global_success.json" },
            { id: "smart_world", title: "English 8 Smart World", file: "question_smart_world.json" }
          ]
        };
      }
    }

    function renderDatasetOptions() {
      $("datasetInput").innerHTML = state.datasets.map((dataset) => `
        <option value="${escapeAttr(dataset.id || dataset.file)}">${escapeHtml(dataset.title || dataset.file)}</option>
      `).join("");
    }

    function resolveQuestionDataset() {
      const params = new URLSearchParams(location.search);
      const requested = params.get("questions") || params.get("file") || params.get("data") || params.get("bank") || params.get("q");
      const defaultFile = state.manifest.default || (state.datasets[0] && state.datasets[0].file) || "question_global_success.json";
      const selected = requested
        ? findDataset(requested, state.datasets) || { file: requested, title: requested }
        : findDataset(defaultFile, state.datasets) || { file: defaultFile, title: defaultFile };

      if (!isSafeQuestionFile(selected.file)) {
        throw new Error(`Tên file câu hỏi không hợp lệ: ${selected.file}`);
      }
      return selected;
    }

    async function loadDataset(dataset) {
      state.questionFile = dataset.file;
      state.questionTitle = dataset.title || dataset.file;
      $("datasetInput").value = dataset.id || dataset.file;
      state.questions = await readQuestionData(dataset.file);
      renderUnitChoices();
      document.title = `${state.questionTitle} - Tạo đề in offline`;
    }

    async function readQuestionData(file) {
      const embedded = getEmbeddedDataset(file);
      if (location.protocol === "file:" && embedded) return embedded;

      try {
        const response = await fetch(file, { cache: "no-store" });
        if (!response.ok) throw new Error(`Không tải được ${file}`);
        return await response.json();
      } catch (error) {
        if (embedded) {
          console.warn(`Không đọc được ${file}, dùng dữ liệu nhúng.`, error);
          return embedded;
        }
        throw error;
      }
    }

    function getEmbeddedDataset(file) {
      const normalized = String(file || "").split("/").pop();
      const resolver = EMBEDDED_DATASETS[normalized];
      return resolver ? resolver() : null;
    }

    function renderUnitChoices() {
      const units = getUnitsFromQuestions();
      if (!units.length) {
        $("printUnitChoices").innerHTML = `<div class="empty">Chưa tải được danh sách Unit.</div>`;
        return;
      }
      $("printUnitChoices").innerHTML = units.map((unit) => `
        <label class="unit-card">
          <input type="checkbox" name="printUnit" value="${unit.unitNumber}" checked>
          <span>
            <strong>Unit ${escapeHtml(unit.unitNumber)}</strong>
            <span>${escapeHtml(unit.unitTitle)}</span>
          </span>
        </label>
      `).join("");
      document.querySelectorAll("input[name='printUnit']").forEach((input) => {
        input.addEventListener("change", () => {
          updateFilteredQuestions();
          generatePaper();
        });
      });
    }

    function applyUnitParam() {
      const params = new URLSearchParams(location.search);
      const rawUnits = params.get("units");
      if (!rawUnits) return;
      const requested = new Set(rawUnits.split(",").map((value) => Number(value.trim())).filter(Boolean));
      if (!requested.size) return;
      document.querySelectorAll("input[name='printUnit']").forEach((input) => {
        input.checked = requested.has(Number(input.value));
      });
    }

    function updateFilteredQuestions() {
      const selectedUnits = selectedUnitValues();
      if (!selectedUnits.length) {
        state.filtered = [...state.questions];
      } else {
        state.filtered = state.questions.filter((question) => selectedUnits.includes(getQuestionUnitNumber(question)));
      }
      $("questionCountInput").max = state.filtered.length || 1;
    }

    function generatePaper() {
      updateFilteredQuestions();
      if (!state.filtered.length) {
        $("exam").innerHTML = `<div class="empty">Không có câu hỏi trong Unit đã chọn.</div>`;
        $("notice").textContent = "Hãy chọn ít nhất một Unit hoặc bấm Chọn tất cả.";
        return;
      }

      const count = clamp(Number($("questionCountInput").value || 40), 1, state.filtered.length);
      $("questionCountInput").value = count;

      let code = normalizeExamCode($("examCodeInput").value);
      if (!code) {
        code = makeExamCode();
      }
      $("examCodeInput").value = code;

      const unitSeed = selectedUnitValues().join(",");
      const seed = hashString(`${code}|${count}|${state.questionFile}|${unitSeed}|english-quiz-print`);
      const random = mulberry32(seed);
      const questions = shuffleWithRandom([...state.filtered], random)
        .slice(0, count)
        .map((question, index) => {
          const options = shuffleWithRandom([...question.options], random).slice(0, 4);
          if (!options.includes(question.answer)) {
            options[options.length - 1] = question.answer;
            shuffleWithRandom(options, random);
          }
          return {
            ...question,
            printNumber: index + 1,
            printOptions: options
          };
        });

      state.paper = {
        code,
        count,
        createdAt: new Date(),
        questions
      };

      updateUrl(code, count);
      renderPaper();
    }

    function renderPaper() {
      if (!state.paper) return;

      document.documentElement.style.setProperty("--font-size", $("fontSizeInput").value);
      document.documentElement.style.setProperty("--print-font-size", $("fontSizeInput").value);

      const answerPageClass = $("separateAnswerInput").checked ? "answer-page" : "answer-page no-answer-key";
      const examPages = buildExamPages();
      const pageCount = examPages.length;
      $("exam").innerHTML = `
        ${examPages.map((questions, index) => renderExamPage(questions, index + 1, pageCount)).join("")}
        <section class="${answerPageClass}">
          <h2 class="key-title">BẢNG ĐÁP ÁN ĐỀ ${escapeHtml(state.paper.code)}</h2>
          ${renderAnswerSheet(true)}
          ${renderReadableAnswerKey()}
          ${renderStatsSection()}
          ${renderTeacherSignature()}
        </section>
      `;
    }

    function renderExamPage(questions, pageNumber, pageCount) {
      const isFirstPage = pageNumber === 1;
      const isLastPage = pageNumber === pageCount;
      return `
        <section class="exam-page ${isLastPage && !$("separateAnswerInput").checked ? "last" : ""}">
          ${isFirstPage ? renderHeader(pageCount) : ""}
          ${isFirstPage && $("studentAnswerInput").checked ? renderAnswerSheet(false) : ""}
          <section class="questions">
            ${questions.map(renderQuestion).join("")}
          </section>
          ${isLastPage ? `<p class="end-note">--- Hết ---</p>` : ""}
          ${renderExamFooter(pageNumber, pageCount)}
        </section>
      `;
    }

    function renderHeader(pageCount) {
      return `
        <header class="exam-header">
          <div>
            <div class="exam-title-row">
              <h1>ĐỀ KIỂM TRA: <span class="dot-line"></span></h1>
            </div>
            <div class="exam-info-row">
              <span>Thời gian làm bài: <span class="dot-line"></span> phút</span>
              <span>Đề kiểm tra có ${pageCount} trang, ${state.paper.count} câu hỏi</span>
            </div>
            <div class="student-info">
              <span>Họ và tên:</span><span class="line"></span>
              <span>Lớp:</span><span class="line"></span>
              <span>STT/SBD:</span><span class="line"></span>
              <span>Ngày:</span><span class="line"></span>
            </div>
          </div>
          ${renderCodeQr()}
        </header>
      `;
    }

    function renderExamFooter(pageNumber, pageCount) {
      return `
        <footer class="page-footer">
          <span>Trang ${pageNumber}/${pageCount}</span>
          <span>Mã đề: ${escapeHtml(state.paper.code)}</span>
        </footer>
      `;
    }

    function renderAnswerSheet(withKey) {
      const columns = makeColumns(state.paper.questions, 5);
      const rows = columns.map((column) => `
        <div class="${withKey ? "key-column" : "bubble-column"}">
          ${column.map((question) => {
        const correctIndex = question.printOptions.indexOf(question.answer);
        return `
          <div class="${withKey ? "key-item" : "bubble-item"}">
            <span class="bubble-num">${question.printNumber}.</span>
            ${LETTERS.map((letter, index) => `
              <span class="${withKey ? `key-choice ${index === correctIndex ? "hit" : ""}` : "bubble-choice"}">
                <i class="circle">${letter}</i>
              </span>
            `).join("")}
          </div>
        `;
      }).join("")}
        </div>
      `).join("");

      return `
        <section class="answer-sheet marked centered">
          ${renderScanMarkers()}
          <p class="answer-sheet-title">${withKey ? "Đáp án để chấm" : "Bảng điền câu trả lời"}</p>
          <div class="${withKey ? "key-grid" : "bubble-grid"}">${rows}</div>
        </section>
      `;
    }

    function renderReadableAnswerKey() {
      const rows = Math.ceil(state.paper.questions.length / 5);
      const items = state.paper.questions.map((question) => {
        const correctIndex = question.printOptions.indexOf(question.answer);
        const letter = LETTERS[correctIndex] || "?";
        return `<div class="readable-key-item">Câu ${question.printNumber}: ${letter}</div>`;
      }).join("");
      return `
        <section class="readable-key">
          <p class="readable-key-title">Đáp án đọc nhanh</p>
          <div class="readable-key-grid" style="--key-rows: ${rows}">${items}</div>
        </section>
      `;
    }

    function renderTeacherSignature() {
      return `
        <section class="teacher-sign">
          <strong>Giáo viên</strong>
          <span class="sign-line">Ký và ghi rõ họ tên</span>
        </section>
      `;
    }

    function renderCodeQr() {
      return `
        <div class="qr-code-box">
          ${makeQrSvg(state.paper.code)}
          <span class="qr-code-label">Mã đề: ${escapeHtml(state.paper.code)}</span>
        </div>
      `;
    }

    function renderScanMarkers() {
      return `
        <i class="scan-marker tl" aria-hidden="true"></i>
        <i class="scan-marker tr" aria-hidden="true"></i>
        <i class="scan-marker bl" aria-hidden="true"></i>
        <i class="scan-marker br" aria-hidden="true"></i>
      `;
    }

    function makeQrSvg(value) {
      if (typeof qrcode !== "function") {
        return `<strong>${escapeHtml(value)}</strong>`;
      }
      const qr = qrcode(0, "M");
      qr.addData(String(value));
      qr.make();
      return qr.createSvgTag(3, 1);
    }

    function getTimeLimit() {
      return clamp(Number($("timeLimitInput").value || 45), 1, 180);
    }

    function buildExamPages() {
      const pages = [];
      let remaining = [...state.paper.questions];
      const firstPageSize = getQuestionsPerPage(true);
      const nextPageSize = getQuestionsPerPage(false);
      pages.push(remaining.splice(0, firstPageSize));
      while (remaining.length) {
        pages.push(remaining.splice(0, nextPageSize));
      }
      return pages.filter((page) => page.length || !pages.length);
    }

    function getQuestionsPerPage(isFirstPage) {
      const font = Number.parseFloat($("fontSizeInput").value) || 10;
      const hasAnswerSheet = $("studentAnswerInput").checked;
      if (isFirstPage && hasAnswerSheet) {
        if (font <= 8.5) return 18;
        if (font <= 9) return 16;
        if (font <= 10) return 14;
        if (font <= 11) return 12;
        return 10;
      }
      if (font <= 8.5) return 34;
      if (font <= 9) return 30;
      if (font <= 10) return 26;
      if (font <= 11) return 22;
      return 18;
    }

    function makeColumns(items, columnCount) {
      const columnSize = Math.ceil(items.length / columnCount);
      return Array.from({ length: columnCount }, (_, index) => {
        const start = index * columnSize;
        return items.slice(start, start + columnSize);
      }).filter((column) => column.length);
    }

    function renderQuestion(question) {
      const correctClass = $("boldAnswerInput").checked ? "correct" : "";
      return `
        <article class="question">
          <p class="q-text">
            ${question.printNumber}. ${escapeHtml(question.question)}
          </p>
          <div class="options">
            ${question.printOptions.map((option, index) => `
              <div class="option ${option === question.answer ? correctClass : ""}">
                ${LETTERS[index]}. ${escapeHtml(option)}
              </div>
            `).join("")}
          </div>
        </article>
      `;
    }

    function renderStatsSection() {
      const questions = state.paper.questions;
      return `
        <section class="stats-section">
          <h2 class="stats-title">Thống kê đề</h2>
          <p><strong>Số câu:</strong> ${state.paper.count}</p>
          <div class="stats-grid">
            ${renderStatsTable("Theo Unit", countBy(questions, getQuestionUnitLabel), false)}
            ${renderStatsTable("Theo mức độ", countBy(questions, (question) => question.level || "Không rõ"), true, ["Dễ", "Trung bình", "Khá", "Khó"])}
            ${renderStatsTable("Theo loại câu hỏi", countBy(questions, getQuestionCategoryLabel), true)}
          </div>
        </section>
      `;
    }

    function renderStatsTable(title, rows, includePercent, preferredOrder = null) {
      const total = state.paper.questions.length || 1;
      const orderedRows = orderStatsRows(rows, preferredOrder);
      return `
        <div class="stats-box">
          <h3>${escapeHtml(title)}</h3>
          <table class="stats-table">
            <thead>
              <tr>
                <th>Nội dung</th>
                <th>Số câu</th>
                ${includePercent ? "<th>%</th>" : ""}
              </tr>
            </thead>
            <tbody>
              ${orderedRows.map(([label, count]) => `
                <tr>
                  <td>${escapeHtml(label)}</td>
                  <td>${count}</td>
                  ${includePercent ? `<td>${formatPercent(count, total)}</td>` : ""}
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function countBy(items, getLabel) {
      return items.reduce((map, item) => {
        const label = getLabel(item) || "Không rõ";
        map.set(label, (map.get(label) || 0) + 1);
        return map;
      }, new Map());
    }

    function orderStatsRows(rows, preferredOrder) {
      const entries = [...rows.entries()];
      if (!preferredOrder) {
        return entries.sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0], "vi"));
      }
      const rank = new Map(preferredOrder.map((label, index) => [label, index]));
      return entries.sort((a, b) => {
        const rankA = rank.has(a[0]) ? rank.get(a[0]) : Number.MAX_SAFE_INTEGER;
        const rankB = rank.has(b[0]) ? rank.get(b[0]) : Number.MAX_SAFE_INTEGER;
        return rankA - rankB || a[0].localeCompare(b[0], "vi");
      });
    }

    function getQuestionCategoryLabel(question) {
      return question.category || question.categoryKey || "Không rõ";
    }

    function formatPercent(count, total) {
      return `${((count / total) * 100).toFixed(1)}%`;
    }

    function makeExamCode() {
      const alphabet = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
      const random = new Uint32Array(3);
      crypto.getRandomValues(random);
      return Array.from(random, (value) => alphabet[value % alphabet.length]).join("");
    }

    function normalizeExamCode(value) {
      return String(value || "")
        .trim()
        .toUpperCase()
        .replace(/[^A-Z0-9]/g, "")
        .slice(0, 3);
    }

    function updateUrl(code, count) {
      code = normalizeExamCode(code);
      const params = new URLSearchParams(location.search);
      params.set("code", code);
      params.set("count", count);
      params.set("font", $("fontSizeInput").value);
      params.set("time", getTimeLimit());
      const dataset = findDataset(state.questionFile, state.datasets);
      if (dataset && dataset.id) {
        params.set("bank", dataset.id);
        params.delete("questions");
      } else {
        params.set("questions", state.questionFile);
      }
      const units = selectedUnitValues();
      if (units.length) params.set("units", units.join(","));
      else params.delete("units");
      history.replaceState(null, "", `${location.pathname}?${params.toString()}`);
      $("notice").textContent = `Đã tạo mã đề ${code} từ ${state.questionTitle}. Lưu URL này để mở lại đúng đề cũ.`;
    }

    function findDataset(value, datasets) {
      return datasets.find((dataset) =>
        dataset.id === value || dataset.file === value || dataset.title === value
      );
    }

    function isSafeQuestionFile(file) {
      return /^[\w.-]+\.json$/i.test(file) && !file.includes("..") && !file.includes("/") && !file.includes("\\");
    }

    function selectedUnitValues() {
      return [...document.querySelectorAll("input[name='printUnit']:checked")]
        .map((input) => Number(input.value))
        .filter(Boolean);
    }

    function getUnitsFromQuestions() {
      const units = new Map();
      state.questions.forEach((question) => {
        const unitNumber = getQuestionUnitNumber(question);
        if (!unitNumber || units.has(unitNumber)) return;
        units.set(unitNumber, {
          unitNumber,
          unitTitle: getQuestionUnitTitle(question),
        });
      });
      return [...units.values()].sort((a, b) => Number(a.unitNumber) - Number(b.unitNumber));
    }

    function getQuestionUnitNumber(question) {
      return Number(question.unitNumber || extractUnitNumber(question.unit));
    }

    function getQuestionUnitTitle(question) {
      const unitNumber = getQuestionUnitNumber(question);
      return question.unitTitle || extractUnitTitle(question.unit) || `Unit ${unitNumber}`;
    }

    function getQuestionUnitLabel(question) {
      const unitNumber = getQuestionUnitNumber(question);
      const unitTitle = getQuestionUnitTitle(question);
      return question.unit || `Unit ${unitNumber} - ${unitTitle}`;
    }

    function extractUnitNumber(unitText) {
      const match = String(unitText || "").match(/Unit\s+(\d+)/i);
      return match ? Number(match[1]) : null;
    }

    function extractUnitTitle(unitText) {
      const match = String(unitText || "").match(/Unit\s+\d+\s*-\s*(.+)$/i);
      return match ? match[1].trim() : "";
    }

    function hashString(value) {
      let hash = 2166136261;
      for (let index = 0; index < value.length; index += 1) {
        hash ^= value.charCodeAt(index);
        hash = Math.imul(hash, 16777619);
      }
      return hash >>> 0;
    }

    function mulberry32(seed) {
      return function random() {
        let value = seed += 0x6D2B79F5;
        value = Math.imul(value ^ value >>> 15, value | 1);
        value ^= value + Math.imul(value ^ value >>> 7, value | 61);
        return ((value ^ value >>> 14) >>> 0) / 4294967296;
      };
    }

    function shuffleWithRandom(array, random) {
      for (let index = array.length - 1; index > 0; index -= 1) {
        const swapIndex = Math.floor(random() * (index + 1));
        [array[index], array[swapIndex]] = [array[swapIndex], array[index]];
      }
      return array;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      })[char]);
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#096;");
    }
  </script>
</body>
